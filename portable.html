:root{
    --bg:#000;
    --text:#fff;
    --accent:#fff;
    --border:#fff;
    --hover:rgba(255,255,255,.12);
    --nav:rgba(0,0,0,.45);
    --toolbar:#000;
    --input-focus:#dcdcdc;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: "Poppins", sans-serif;
    background:var(--bg);
    background-image:var(--bg-image, none);
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
    color:var(--text);
    padding-top:80px;
    text-align: center;
}

#navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:15px 40px;

    background:var(--nav);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);

    border-bottom:1px solid rgba(255,255,255,0.08);
}


#navLeft{
    position:absolute;
    left:20px;
    display:flex;
    align-items:center;
    gap:12px;
}

#navLogo{
    width:42px;
    height:42px;
    border-radius:10px;
}

#navTitle{
    font-size:20px;
    font-weight:500;
    color:var(--text);
}


#navLinks{
    display:flex;
    align-items:center;
    gap:18px;
}

#navLinks a{
    color:var(--text);
    text-decoration:none;
    font-weight:600;
    font-family: "Poppins", sans-serif;
    padding:6px 12px;
    border-radius:10px;

    transition:.2s ease;
    display:flex;
    align-items:center;
    gap:6px;
}


#navLinks a:hover{
    background:var(--hover);
    color:var(--text);
}


.material-icons{
    font-size:22px;
    color:inherit;
}
.btn {
  background: transparent;
  border:2px solid var(--border);
  color:var(--text);
  padding: 10px 20px;
  font-size: 16px;
  font-family: "Poppins", sans-serif;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 8px;
  margin: 5px;
}

.btn:hover {
  background:var(--accent);
    color:var(--bg);
}

#searchContainer{
    display:flex;
    justify-content:center;
    margin:25px 0;
}

#searchBar{
    width:600px;
    max-width:90%;
    padding:12px 18px;
    font-size:1.1em;
    background: transparent;
    border:2px solid var(--border);
    font-family: "Poppins", sans-serif;
    color:var(--text);
    border-radius:8px;
    outline:none;
    transition:.2s ease-in-out;
}

#searchBar:focus{
    background:var(--input-focus);
    transform:scale(1.01);
}

#searchBar::placeholder{
    color:var(--text);
}



#imageGrid {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    max-width: 1100px;
    margin: 0 auto;
}

#imageGrid .image-card {
    width: 220px;
}

.imageCard{
    width:200px;
    background:transparent;
    border:2px solid var(--border);
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:.2s ease-in-out;
}

.imageCard:hover{
    transform:scale(1.04);
    background:var(--hover);
}

.imageCard img{
    width: 200px;
    height: 200px;
    display:block;
}

.imageCard p{
    padding:10px;
    font-size:1em;
    white-space: nowrap;
    font-family: "Poppins", sans-serif;
    overflow: hidden;
    text-overflow: ellipsis;
}

#viewerModal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

#viewerBox{
    width:90%;
    height:90%;
    background:transparent;
    border:2px solid var(--border);
    border-radius:10px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

#viewerToolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    background:var(--toolbar);
    border-bottom:2px solid var(--border);
}

#toolbarButtons{
    display:flex;
    gap:10px;
}

#gameTitle{
    flex:1;
    margin-left:20px;
    color:var(--text);
    font-size:18px;
    font-weight:600;
    font-family: "Poppins", sans-serif;
    text-align:left;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

#viewerFrame{
    flex:1;
    width:100%;
    border:none;
    background:white;
}

main{
    max-width:1000px;
    margin:40px auto;
    padding:20px;
    text-align:center;
}

h1{
    font-size:48px;
    font-family: "Poppins", sans-serif;
}

a{
    text-decoration:none;
}

::-webkit-scrollbar {
    width: 12px;
    height: 12px;
}

::-webkit-scrollbar-track {
    background: var(--bg);
}

::-webkit-scrollbar-thumb {
    background: var(--border);
    border: 3px solid var(--bg);
    border-radius: 999px;
    transition: background .2s ease;
}

::-webkit-scrollbar-thumb:hover {
    background: var(--input-focus);
}

::-webkit-scrollbar-corner {
    background: var(--bg);
}

* {
    scrollbar-width: thin;
    scrollbar-color: var(--border) var(--bg);
}

::selection {
    background: var(--accent);
    color: var(--bg);
}

::-moz-selection {
    background: var(--accent);
    color: var(--bg);
}

const grid = document.getElementById("imageGrid");
const search = document.getElementById("searchBar");

const viewerModal = document.getElementById("viewerModal");
const viewerFrame = document.getElementById("viewerFrame");
const gameTitle = document.getElementById("gameTitle");

// URL ?url= support
const params = new URLSearchParams(window.location.search);
const urlGame = params.get("url");


function render(list) {
    grid.innerHTML = "";

    list.forEach(item => {

        const card = document.createElement("div");
        card.className = "imageCard";

        card.innerHTML = `
            <img src="${item.image}">
            <p>${item.title}</p>
        `;

        card.onclick = () => {
            viewerModal.style.display = "flex";

            if (urlGame) {
                viewerFrame.src = urlGame;
                gameTitle.textContent = "External Game";
            } else {
                viewerFrame.src = item.source;
                gameTitle.textContent = item.title;
            }
        };

        grid.appendChild(card);

    });
}


render(images);

if (urlGame) {
    viewerModal.style.display = "flex";
    viewerFrame.src = urlGame;
    gameTitle.textContent = "External Content on Bunnies";
}


search.addEventListener("input", () => {

    const value = search.value.toLowerCase();

    render(images.filter(image =>
        image.title.toLowerCase().includes(value)
    ));

});


function closeFrame() {
    viewerModal.style.display = "none";
    viewerFrame.src = "";
    gameTitle.textContent = "No game selected";
}


function refreshFrame() {
    viewerFrame.src = viewerFrame.src;
}


function fullscreenFrame() {
    if (viewerFrame.requestFullscreen) {
        viewerFrame.requestFullscreen();
    }
}
